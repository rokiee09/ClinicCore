# Site: https://rokiee09.github.io/ClinicCore/
# Pages: branch = main, folder = /docs (Deploy from a branch → main → /docs)
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-docs
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build -- --base /ClinicCore/

      - name: Publish dist to main/docs
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: main
          folder: dist
          target-folder: docs
          clean: true
          commit-message: "deploy: GitHub Pages [skip ci]"
